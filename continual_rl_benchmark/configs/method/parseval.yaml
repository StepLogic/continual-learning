defaults:
  - base

name: "parseval"
# Parseval Regularization: Orthogonality-constrained optimization (NeurIPS 2024)
# Maintains weight matrix orthogonality to preserve plasticity
agent:
  hidden_dim: 256
  learning_rate: 3e-4
  buffer_size: 1000000
  batch_size: 256
  gamma: 0.99
  tau: 0.005
  alpha: 0.2
  target_update_freq: 1
  # Parseval specific
  parseval_lambda: 0.1  # Orthogonality regularization strength
  orthogonality_freq: 10  # Apply every N steps
