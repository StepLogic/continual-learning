defaults:
  - base

name: "fast_trac"
# Fast TRAC: Parameter-free optimizer (NeurIPS 2024)
# Uses online convex optimization principles to adapt learning rates
agent:
  hidden_dim: 256
  buffer_size: 1000000
  batch_size: 256
  gamma: 0.99
  tau: 0.005
  alpha: 0.2
  target_update_freq: 1
  # Fast TRAC specific
  optimizer_type: "fast_trac"
  base_lr: 0.003
  momentum_decay: 0.99
  grad_scale_threshold: 1.0
