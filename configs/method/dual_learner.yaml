defaults:
  - base

name: "dual_learner"
# Dual-Learner: Fast + Meta knowledge learners (ICLR 2026)
# Hippocampus-cortex inspired architecture
agent:
  hidden_dim: 256
  learning_rate: 3e-4
  buffer_size: 1000000
  batch_size: 256
  gamma: 0.99
  tau: 0.005
  alpha: 0.2
  target_update_freq: 1
  # Dual-learner specific
  fast_lr: 0.001  # Fast learner (hippocampus) - rapid adaptation
  meta_lr: 0.0001  # Meta learner (cortex) - slow integration
  switch_threshold: 0.5  # When to switch learners
